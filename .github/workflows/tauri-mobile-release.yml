name: "📱 Mobile Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.36)"
        required: true
        type: string
      stage:
        description: "SST stage (dev = internal testing, prod = production)"
        required: false
        type: choice
        options:
          - prod
          - dev
        default: prod
  pull_request:
    types: [closed]
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  CI: true

defaults:
  run:
    shell: bash

jobs:
  prepare-pr:
    name: "📝 Prepare release PR"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: "✅ Validate version format"
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected: X.Y.Z)"
            exit 1
          fi

      - name: "📥 Checkout source branch"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🦀 Setup Rust"
        uses: dtolnay/rust-toolchain@stable

      - name: "🔄 Sync version"
        run: bun run --cwd apps/wallet tauri:version "$VERSION"
        env:
          VERSION: ${{ inputs.version }}

      - name: "📝 Promote CHANGELOG [Unreleased] → [${{ inputs.version }}]"
        # Pinned to commit on main (PR #86) which adds support for explicit semver versions.
        # v3.0.0 (the latest tag) only accepts bump keywords (patch/minor/major) and rejects values like "1.0.28".
        # Revert to @v3 once a newer tag is released that contains this change.
        uses: release-flow/keep-a-changelog-action@51fdfb38631a4d2530cf1f3b11c0bba0c0f5f1e2
        with:
          command: bump
          version: ${{ inputs.version }}
          changelog: apps/wallet/src-tauri/CHANGELOG.md
          tag-prefix: app-
          keep-unreleased-section: true
          fail-on-empty-release-notes: true

      - name: "📌 Create release PR"
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/mobile-${{ inputs.version }}
          base: ${{ github.ref_name }}
          title: "chore(mobile): release ${{ inputs.version }} (${{ inputs.stage }})"
          commit-message: "chore(mobile): release ${{ inputs.version }}"
          body: |
            Release **Frak Wallet Mobile ${{ inputs.version }}** (stage: `${{ inputs.stage }}`).

            Merging this PR will:
            - Build iOS (IPA) and Android (AAB)
            - Upload iOS to TestFlight and Android to Google Play (internal track)
            - Tag the merge commit as `app-${{ inputs.version }}`
            - Create a GitHub release with the CHANGELOG notes + IPA + AAB
          labels: |
            release:mobile
            release:mobile:${{ inputs.stage }}
          delete-branch: true

  validate:
    name: "✅ Validate"
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release:mobile') &&
      startsWith(github.event.pull_request.head.ref, 'release/mobile-')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      stage: ${{ steps.extract.outputs.stage }}
    steps:
      - name: "🏷️ Extract version & stage from PR"
        id: extract
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          VERSION="${BRANCH#release/mobile-}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Could not parse version from branch: $BRANCH"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if echo "$LABELS" | jq -r '.[]' | grep -qx 'release:mobile:dev'; then
            echo "stage=dev" >> "$GITHUB_OUTPUT"
          else
            echo "stage=prod" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    name: "📦 Build SDK"
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 1

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "💾 Cache Bun modules"
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🏗️ Build SDK packages"
        run: bun run build:sdk

      - name: "📤 Upload SDK artifact"
        uses: actions/upload-artifact@v7
        with:
          name: sdk-dist
          # Only needed within this workflow run
          retention-days: 1
          path: |
            sdk/*/dist/
            sdk/*/cdn/
            packages/rpc/dist/

  ios:
    name: "🍎 iOS"
    needs: [validate, prepare]
    runs-on: macos-26

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 1

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "💾 Cache Bun modules"
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🔗 Add node_modules binaries to PATH"
        run: |
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$PWD/apps/wallet/node_modules/.bin" >> "$GITHUB_PATH"

      - name: "📥 Download SDK artifact"
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: "🦀 Setup Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: "💾 Cache Rust"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/wallet/src-tauri
          cache-on-failure: true

      - name: "💾 Setup SST Cache"
        id: sst-caching
        uses: actions/cache@v5
        with:
          path: |
            .sst/platform/
            .sst/provider-lock.json
            .sst/esbuild.json
            ~/Library/Application Support/sst/bin/
          key: ${{ runner.os }}-sst-v2-${{ hashFiles('./sst.config.ts') }}
          restore-keys: ${{ runner.os }}-sst-v2-

      - name: "💾 Cache Xcode DerivedData"
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-derived-${{ hashFiles('apps/wallet/src-tauri/gen/apple/**') }}
          restore-keys: ${{ runner.os }}-xcode-derived-

      - name: "👥 Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::262732185023:role/github-action-deploy-role
          aws-region: eu-west-1
          retry-max-attempts: 5

      - name: "🔑 Write App Store Connect API key"
        run: echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: "🔥 Write Firebase config"
        run: |
          VALUE=$(bunx sst secret list --stage "$STAGE" | sed -n 's/^FIREBASE_IOS_CONFIG_BASE64=//p' | tail -1)
          if [ -z "$VALUE" ]; then
            echo "::error::FIREBASE_IOS_CONFIG_BASE64 not set for stage $STAGE"
            exit 1
          fi
          echo "$VALUE" | base64 -d > apps/wallet/src-tauri/gen/apple/app_iOS/GoogleService-Info.plist
          echo "[ci] GoogleService-Info.plist written ($(wc -c < apps/wallet/src-tauri/gen/apple/app_iOS/GoogleService-Info.plist) bytes)"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}

      - name: "🏗️ Build iOS"
        # cd into wallet app so tauri finds src-tauri/ and beforeBuildCommand runs in correct directory
        run: sst shell --stage "$STAGE" --print-logs -- bash -c "cd apps/wallet && tauri ios build --export-method app-store-connect"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}
          VITE_WALLET_MODE: ${{ needs.validate.outputs.stage == 'prod' && 'loyalty' || 'crypto' }}
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8

      # apple-actions/upload-testflight-build@v4 uses iTMSTransporter which was removed in Xcode 14+.
      # xcrun altool is the supported replacement on macos-15 (Xcode 16.4).
      - name: "🚀 Upload to TestFlight"
        run: |
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          echo "$APPLE_API_KEY_CONTENT" > "$API_PRIVATE_KEYS_DIR/AuthKey_$APPLE_API_KEY.p8"
          xcrun altool --upload-app \
            -f "apps/wallet/src-tauri/gen/apple/build/arm64/Frak Wallet.ipa" \
            -t ios \
            --apiKey "$APPLE_API_KEY" \
            --apiIssuer "$APPLE_API_ISSUER"
          rm -rf "$API_PRIVATE_KEYS_DIR"
        env:
          API_PRIVATE_KEYS_DIR: ${{ runner.temp }}/private_keys
          APPLE_API_KEY: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: "📦 Upload iOS artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: "apps/wallet/src-tauri/gen/apple/build/arm64/Frak Wallet.ipa"

  android:
    name: "🤖 Android"
    needs: [validate, prepare]
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 1

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "💾 Cache Bun modules"
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🔗 Add node_modules binaries to PATH"
        run: |
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$PWD/apps/wallet/node_modules/.bin" >> "$GITHUB_PATH"

      - name: "📥 Download SDK artifact"
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: "☕ Setup Java 17"
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v4

      - name: "💾 Cache Gradle wrapper"
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('apps/wallet/src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-wrapper-

      - name: "🦀 Setup Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: "💾 Cache Rust"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/wallet/src-tauri
          cache-on-failure: true

      - name: "💾 Setup SST Cache"
        id: sst-caching
        uses: actions/cache@v5
        with:
          path: |
            .sst/platform/
            .sst/provider-lock.json
            .sst/esbuild.json
            ~/.config/sst/bin/
          key: ${{ runner.os }}-sst-v2-${{ hashFiles('./sst.config.ts') }}
          restore-keys: ${{ runner.os }}-sst-v2-

      - name: "👥 Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::262732185023:role/github-action-deploy-role
          aws-region: eu-west-1
          retry-max-attempts: 5

      - name: "🔑 Write Android signing files"
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > apps/wallet/src-tauri/gen/android/upload-keystore.jks
          cat > apps/wallet/src-tauri/gen/android/key.properties << EOF
          storeFile=../upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=upload
          keyPassword=$KEY_PASSWORD
          EOF
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: "🔥 Write Firebase config"
        run: |
          VALUE=$(bunx sst secret list --stage "$STAGE" | sed -n 's/^FIREBASE_ANDROID_CONFIG_BASE64=//p' | tail -1)
          if [ -z "$VALUE" ]; then
            echo "::error::FIREBASE_ANDROID_CONFIG_BASE64 not set for stage $STAGE"
            exit 1
          fi
          echo "$VALUE" | base64 -d > apps/wallet/src-tauri/gen/android/app/google-services.json
          echo "[ci] google-services.json written ($(wc -c < apps/wallet/src-tauri/gen/android/app/google-services.json) bytes)"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}

      - name: "🏗️ Build Android"
        # cd into wallet app so tauri finds src-tauri/ and beforeBuildCommand runs in correct directory
        run: sst shell --stage "$STAGE" --print-logs -- bash -c "cd apps/wallet && tauri android build"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}
          VITE_WALLET_MODE: ${{ needs.validate.outputs.stage == 'prod' && 'loyalty' || 'crypto' }}

      # TODO: Graduate from `internal` track to `production` when ready for public release
      - name: "🚀 Upload to Play Store"
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: id.frak.wallet
          releaseFiles: apps/wallet/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          track: internal
          status: draft

      - name: "📦 Upload Android artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: apps/wallet/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab

  github-release:
    name: "🏷️ GitHub Release"
    needs: [validate, ios, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "📥 Checkout merge commit"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: "📥 Download iOS artifact"
        uses: actions/download-artifact@v8
        with:
          name: ios-ipa
          path: release-assets/ios

      - name: "📥 Download Android artifact"
        uses: actions/download-artifact@v8
        with:
          name: android-aab
          path: release-assets/android

      - name: "📝 Extract release notes"
        id: notes
        uses: release-flow/keep-a-changelog-action@v3
        with:
          command: query
          version: ${{ needs.validate.outputs.version }}
          changelog: apps/wallet/src-tauri/CHANGELOG.md

      - name: "🏷️ Create tag"
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "app-${VERSION}"
          git push origin "app-${VERSION}"

      - name: "🚀 Create GitHub release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "app-${{ needs.validate.outputs.version }}"
          name: "Frak Wallet ${{ needs.validate.outputs.version }}"
          body: ${{ steps.notes.outputs.release-notes }}
          prerelease: ${{ needs.validate.outputs.stage == 'dev' }}
          files: |
            release-assets/ios/*.ipa
            release-assets/android/*.aab
