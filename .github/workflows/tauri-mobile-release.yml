name: "🚀 Release Mobile App"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.36)"
        required: true
        type: string
      stage:
        description: "SST stage (dev = internal testing, prod = production)"
        required: false
        type: choice
        options:
          - prod
          - dev
        default: prod
  pull_request:
    types: [closed]
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  CI: true

defaults:
  run:
    shell: bash

jobs:
  prepare-pr:
    name: "📝 Prepare release PR"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: "✅ Validate version format"
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected: X.Y.Z)"
            exit 1
          fi

      - name: "📥 Checkout source branch"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🦀 Setup Rust"
        uses: dtolnay/rust-toolchain@stable

      - name: "🔄 Sync version"
        run: bun run --cwd apps/wallet tauri:version "$VERSION"
        env:
          VERSION: ${{ inputs.version }}

      - name: "📌 Create release PR"
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/mobile-${{ inputs.version }}
          base: ${{ github.ref_name }}
          title: "chore(mobile): release ${{ inputs.version }} (${{ inputs.stage }})"
          commit-message: "chore(mobile): release ${{ inputs.version }}"
          body: |
            Release **Frak Wallet Mobile ${{ inputs.version }}** (stage: `${{ inputs.stage }}`).

            Merging this PR will:
            - Build iOS (IPA) and Android (AAB)
            - Upload iOS to TestFlight and Android to Google Play (internal track)
            - Tag the merge commit as `app-${{ inputs.version }}`
            - Create a GitHub release with auto-generated notes + IPA + AAB
          labels: |
            release:mobile
            release:mobile:${{ inputs.stage }}
          delete-branch: true

  validate:
    name: "✅ Validate"
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release:mobile') &&
      startsWith(github.event.pull_request.head.ref, 'release/mobile-')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      stage: ${{ steps.extract.outputs.stage }}
    steps:
      - name: "🏷️ Extract version & stage from PR"
        id: extract
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          VERSION="${BRANCH#release/mobile-}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Could not parse version from branch: $BRANCH"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if echo "$LABELS" | jq -r '.[]' | grep -qx 'release:mobile:dev'; then
            echo "stage=dev" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | jq -r '.[]' | grep -qx 'release:mobile:prod'; then
            echo "stage=prod" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Release PR must carry either 'release:mobile:dev' or 'release:mobile:prod' label"
            exit 1
          fi

  prepare:
    name: "📦 Build SDK"
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 1

      - name: "🟢 Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "💾 Cache Bun modules"
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🏗️ Build SDK packages"
        run: bun run build:sdk

      - name: "📤 Upload SDK artifact"
        uses: actions/upload-artifact@v7
        with:
          name: sdk-dist
          # Only needed within this workflow run
          retention-days: 1
          path: |
            sdk/*/dist/
            sdk/*/cdn/
            packages/rpc/dist/

  ios:
    name: "🍎 iOS"
    needs: [validate, prepare]
    runs-on: macos-26

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 1

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "💾 Cache Bun modules"
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🔗 Add node_modules binaries to PATH"
        run: |
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$PWD/apps/wallet/node_modules/.bin" >> "$GITHUB_PATH"

      - name: "📥 Download SDK artifact"
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: "🦀 Setup Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: "💾 Cache Rust"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/wallet/src-tauri
          cache-on-failure: true
          key: ${{ needs.validate.outputs.stage }}
          prefix-key: "v1-rust"

      - name: "💾 Setup SST Cache"
        id: sst-caching
        uses: actions/cache@v5
        with:
          path: |
            .sst/platform/
            .sst/provider-lock.json
            .sst/esbuild.json
            ~/Library/Application Support/sst/bin/
          key: ${{ runner.os }}-sst-v2-${{ hashFiles('./sst.config.ts') }}
          restore-keys: ${{ runner.os }}-sst-v2-

      - name: "💾 Cache Xcode DerivedData"
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-derived-${{ hashFiles('apps/wallet/src-tauri/gen/apple/**') }}
          restore-keys: ${{ runner.os }}-xcode-derived-

      # `swift-rs` invokes `swift build` from each plugin's build.rs in parallel under cargo,
      # racing over this single global cache. Caching it across runs gives subsequent runs warm
      # artifacts; the pre-warm step below covers cold (cache-miss) runs.
      - name: "💾 Cache SwiftPM artifacts"
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/wallet/src-tauri/plugins/*/ios/Package.resolved', 'apps/wallet/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: "👥 Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::262732185023:role/github-action-deploy-role
          aws-region: eu-west-1
          retry-max-attempts: 5

      - name: "🔑 Write App Store Connect API key"
        run: echo "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: "🔥 Write Firebase config"
        run: |
          VALUE=$(bunx sst secret list --stage "$STAGE" | sed -n 's/^FIREBASE_IOS_CONFIG_BASE64=//p' | tail -1)
          if [ -z "$VALUE" ]; then
            echo "::error::FIREBASE_IOS_CONFIG_BASE64 not set for stage $STAGE"
            exit 1
          fi
          echo "$VALUE" | base64 -d > apps/wallet/src-tauri/gen/apple/app_iOS/GoogleService-Info.plist
          echo "[ci] GoogleService-Info.plist written ($(wc -c < apps/wallet/src-tauri/gen/apple/app_iOS/GoogleService-Info.plist) bytes)"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}

      # `swift-rs` runs `swift build` from each plugin's build.rs in parallel under cargo,
      # racing over the global SwiftPM artifact cache. Pre-resolving with a standalone stub
      # package serializes the Firebase binary-artifact downloads (FirebaseAnalytics.zip,
      # grpcpp.zip, etc.) so the subsequent parallel `swift build` invocations all hit a warm
      # cache instead of failing with `already exists in file system`.
      #
      # The stub avoids depending on the crashlytics plugin's Package.swift directly, which
      # references `../.tauri/tauri-api` — that path is only materialized later by tauri-build
      # during `cargo build`. The SPM artifact cache is keyed by binary-target URL (global,
      # shared), so any resolve that fetches the same URLs warms the same slots.
      #
      # Keep the firebase-ios-sdk pin in sync with `plugins/tauri-plugin-frak-crashlytics/ios/Package.swift`.
      # See: https://github.com/firebase/firebase-ios-sdk/issues/14821
      - name: "🔥 Pre-warm SwiftPM artifact cache"
        run: |
          PREWARM_DIR="$RUNNER_TEMP/spm-prewarm"
          mkdir -p "$PREWARM_DIR/Sources/Prewarm"
          cat > "$PREWARM_DIR/Package.swift" <<'EOF'
          // swift-tools-version:5.7
          import PackageDescription
          let package = Package(
              name: "Prewarm",
              platforms: [.iOS(.v14), .macOS(.v10_15)],
              products: [.library(name: "Prewarm", targets: ["Prewarm"])],
              dependencies: [
                  .package(url: "https://github.com/firebase/firebase-ios-sdk", from: "12.11.0"),
              ],
              targets: [
                  .target(
                      name: "Prewarm",
                      dependencies: [
                          .product(name: "FirebaseCrashlytics", package: "firebase-ios-sdk"),
                          .product(name: "FirebaseMessaging", package: "firebase-ios-sdk"),
                          .product(name: "FirebaseAnalytics", package: "firebase-ios-sdk"),
                          .product(name: "FirebaseFirestore", package: "firebase-ios-sdk"),
                      ]
                  )
              ]
          )
          EOF
          echo '// stub' > "$PREWARM_DIR/Sources/Prewarm/Stub.swift"
          cd "$PREWARM_DIR"
          swift package resolve

      - name: "🏗️ Build iOS"
        # cd into wallet app so tauri finds src-tauri/ and beforeBuildCommand runs in correct directory.
        # FRAK_VARIANT=dev triggers build.rs (src-tauri/build.rs) to rewrite the entitlements
        # file in place for the dev variant (associated domains → wallet-dev.frak.id, keychain
        # access group → id.frak.wallet.dev). The --config overlay flips identifier + productName.
        run: |
          if [ "$STAGE" = "dev" ]; then
            CONFIG_FLAG="--config src-tauri/tauri.conf.dev.json"
          else
            CONFIG_FLAG=""
          fi
          sst shell --stage "$STAGE" --print-logs -- bash -c \
            "cd apps/wallet && tauri ios build $CONFIG_FLAG --export-method app-store-connect"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}
          FRAK_VARIANT: ${{ needs.validate.outputs.stage }}
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8

      # apple-actions/upload-testflight-build@v4 uses iTMSTransporter which was removed in Xcode 14+.
      # xcrun altool is the supported replacement on macos-15 (Xcode 16.4).
      - name: "🚀 Upload to TestFlight"
        run: |
          if [ "$STAGE" = "dev" ]; then
            IPA_PATH="apps/wallet/src-tauri/gen/apple/build/arm64/Frak Wallet Dev.ipa"
          else
            IPA_PATH="apps/wallet/src-tauri/gen/apple/build/arm64/Frak Wallet.ipa"
          fi
          mkdir -p "$API_PRIVATE_KEYS_DIR"
          echo "$APPLE_API_KEY_CONTENT" > "$API_PRIVATE_KEYS_DIR/AuthKey_$APPLE_API_KEY.p8"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPLE_API_KEY" \
            --apiIssuer "$APPLE_API_ISSUER"
          rm -rf "$API_PRIVATE_KEYS_DIR"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}
          API_PRIVATE_KEYS_DIR: ${{ runner.temp }}/private_keys
          APPLE_API_KEY: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: "📦 Upload iOS artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: "apps/wallet/src-tauri/gen/apple/build/arm64/Frak Wallet${{ needs.validate.outputs.stage == 'dev' && ' Dev' || '' }}.ipa"

  android:
    name: "🤖 Android"
    needs: [validate, prepare]
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 1

      - name: "🧅 Setup Bun"
        uses: oven-sh/setup-bun@v2

      - name: "💾 Cache Bun modules"
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: "📦 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "🔗 Add node_modules binaries to PATH"
        run: |
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$PWD/apps/wallet/node_modules/.bin" >> "$GITHUB_PATH"

      - name: "📥 Download SDK artifact"
        uses: actions/download-artifact@v8
        with:
          name: sdk-dist

      - name: "☕ Setup Java 17"
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: "📱 Setup Android SDK"
        uses: android-actions/setup-android@v4

      - name: "💾 Cache Gradle wrapper"
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('apps/wallet/src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-wrapper-

      - name: "🦀 Setup Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: "💾 Cache Rust"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/wallet/src-tauri
          cache-on-failure: true

      - name: "💾 Setup SST Cache"
        id: sst-caching
        uses: actions/cache@v5
        with:
          path: |
            .sst/platform/
            .sst/provider-lock.json
            .sst/esbuild.json
            ~/.config/sst/bin/
          key: ${{ runner.os }}-sst-v2-${{ hashFiles('./sst.config.ts') }}
          restore-keys: ${{ runner.os }}-sst-v2-

      - name: "👥 Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::262732185023:role/github-action-deploy-role
          aws-region: eu-west-1
          retry-max-attempts: 5

      - name: "🔑 Write Android signing files"
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > apps/wallet/src-tauri/gen/android/upload-keystore.jks
          cat > apps/wallet/src-tauri/gen/android/key.properties << EOF
          storeFile=../upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=upload
          keyPassword=$KEY_PASSWORD
          EOF
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: "🔥 Write Firebase config"
        run: |
          VALUE=$(bunx sst secret list --stage "$STAGE" | sed -n 's/^FIREBASE_ANDROID_CONFIG_BASE64=//p' | tail -1)
          if [ -z "$VALUE" ]; then
            echo "::error::FIREBASE_ANDROID_CONFIG_BASE64 not set for stage $STAGE"
            exit 1
          fi
          echo "$VALUE" | base64 -d > apps/wallet/src-tauri/gen/android/app/google-services.json
          echo "[ci] google-services.json written ($(wc -c < apps/wallet/src-tauri/gen/android/app/google-services.json) bytes)"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}

      - name: "🏗️ Build Android"
        # cd into wallet app so tauri finds src-tauri/ and beforeBuildCommand runs in correct directory.
        # FRAK_VARIANT flips the wallet variant in app/build.gradle.kts (id.frak.wallet[.dev], app
        # name, app link host, deep-link scheme).
        #
        # We pass `--config src-tauri/tauri.conf.android-dev.json` for the dev stage (NOT
        # `tauri.conf.dev.json`). Android's `applicationId` is decoupled from `namespace`
        # (Kotlin source package) by Gradle, so the dev bundle id comes from build.gradle.kts —
        # not Tauri's `identifier`. Overriding `identifier` would make Tauri CLI look for
        # sources at gen/android/app/src/main/java/id/frak/wallet/dev/ which doesn't exist.
        # The Android-specific overlay only flips `plugins.deep-link.mobile` so each variant
        # gets strict per-variant deep-link intent-filters (dev: wallet-dev.frak.id +
        # frakwallet-dev:// only; prod: wallet.frak.id + frakwallet:// only).
        run: |
          if [ "$STAGE" = "dev" ]; then
            CONFIG_FLAG="--config src-tauri/tauri.conf.android-dev.json"
          else
            CONFIG_FLAG=""
          fi
          sst shell --stage "$STAGE" --print-logs -- bash -c \
            "cd apps/wallet && tauri android build $CONFIG_FLAG"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}
          FRAK_VARIANT: ${{ needs.validate.outputs.stage }}

      # Crashlytics symbol upload — runs against the unstripped Rust .so files emitted
      # by `[profile.release] strip = false`. Without this, Rust panic backtraces in
      # Crashlytics show only `art_quick_generic_jni_trampoline` + `<unknown>` frames
      # (no Rust function names).
      #
      # The task is registered by `com.google.firebase.crashlytics` Gradle plugin. AGP
      # still strips the .so before packaging the AAB, so the shipped binary stays small.
      #
      # We `-x` the `rustBuild*Release` tasks because they would otherwise re-run as a
      # transitive dependency of `merge*JniLibFolders`. Their `BuildTask` declares no
      # `@OutputDirectory`, so Gradle treats them as always-out-of-date, and they shell out
      # to `tauri android android-studio-script` which expects a parent `tauri android build`
      # process to be alive (it reads CLI options over a JSON-RPC WebSocket whose addr is
      # left in `/tmp/<identifier>-server-addr` by `write_options`). Outside that lifetime,
      # the addr file is stale and the child panics with `ECONNREFUSED` at
      # `crates/tauri-cli/src/mobile/mod.rs:read_options`. The `.so` files produced by the
      # previous `tauri android build` step are still on disk, so the upload task can run
      # against them without rebuilding.
      - name: "🔍 Upload Crashlytics native symbols"
        # Non-blocking: symbol upload failures must not break the release pipeline.
        # The AAB ships with `app-universal-release.aab`, so we target the Universal
        # variant of the per-ABI task registered by the Crashlytics Gradle plugin.
        continue-on-error: true
        run: |
          sst shell --stage "$STAGE" --print-logs -- bash -c \
            "cd apps/wallet/src-tauri/gen/android && ./gradlew uploadCrashlyticsSymbolFileUniversalRelease \
              -x rustBuildUniversalRelease \
              -x rustBuildArm64Release \
              -x rustBuildArmRelease \
              -x rustBuildX86Release \
              -x rustBuildX86_64Release \
              --no-daemon"
        env:
          STAGE: ${{ needs.validate.outputs.stage }}
          FRAK_VARIANT: ${{ needs.validate.outputs.stage }}

      # TODO: Graduate from `internal` track to `production` when ready for public release
      - name: "🚀 Upload to Play Store"
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ needs.validate.outputs.stage == 'dev' && 'id.frak.wallet.dev' || 'id.frak.wallet' }}
          releaseFiles: apps/wallet/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          track: internal
          status: draft

      - name: "📦 Upload Android artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: apps/wallet/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab

  github-release:
    name: "🏷️ GitHub Release"
    needs: [validate, ios, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "📥 Checkout merge commit"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: "📥 Download iOS artifact"
        uses: actions/download-artifact@v8
        with:
          name: ios-ipa
          path: release-assets/ios

      - name: "📥 Download Android artifact"
        uses: actions/download-artifact@v8
        with:
          name: android-aab
          path: release-assets/android

      - name: "🏷️ Create tag"
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "app-${VERSION}"
          git push origin "app-${VERSION}"

      - name: "🚀 Create GitHub release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "app-${{ needs.validate.outputs.version }}"
          name: "Frak Wallet ${{ needs.validate.outputs.version }}"
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.stage == 'dev' }}
          files: |
            release-assets/ios/*.ipa
            release-assets/android/*.aab
