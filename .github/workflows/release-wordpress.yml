name: "🚀 Release WordPress Plugin"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-wordpress
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: "Build & publish"
    runs-on: ubuntu-latest
    steps:
      - name: "✅ Validate version format"
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected: X.Y.Z)"
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: "📥 Checkout main"
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: "🔢 Bump plugin header version"
        working-directory: plugins/wordpress
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i -E "s|^(\s*\*\s*Version:\s*).*$|\1${VERSION}|" frak-integration.php
          grep -E '^\s*\*\s*Version:' frak-integration.php

      - name: "📝 Promote CHANGELOG [Unreleased] → [${{ inputs.version }}]"
        id: changelog
        uses: release-flow/keep-a-changelog-action@v3
        with:
          command: bump
          version: ${{ inputs.version }}
          changelog: plugins/wordpress/CHANGELOG.md
          tag-prefix: wordpress-
          keep-unreleased-section: true
          fail-on-empty-release-notes: true

      - name: "🐘 Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: "composer:v2"
          coverage: none

      - name: "📦 Build plugin zip"
        working-directory: plugins/wordpress
        env:
          VERSION: ${{ inputs.version }}
        run: |
          chmod +x build.sh
          ./build.sh "$VERSION"

      - name: "📤 Commit version bump + CHANGELOG & create tag"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: "chore(wordpress): release ${{ inputs.version }}"
          file_pattern: |
            plugins/wordpress/frak-integration.php
            plugins/wordpress/CHANGELOG.md
          tagging_message: "wordpress-${{ inputs.version }}"

      - name: "🚀 Create GitHub release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "wordpress-${{ inputs.version }}"
          name: "WordPress Plugin ${{ inputs.version }}"
          body: ${{ steps.changelog.outputs.release-notes }}
          files: plugins/wordpress/dist/frak-integration-*.zip
