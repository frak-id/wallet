name: Beta Release

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'packages/rpc/**/*.ts'
      - 'packages/rpc/**/package.json'
      - 'sdk/**/*.ts'
      - 'sdk/**/*.tsx'
      - 'sdk/**/package.json'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  beta-release:
    name: Beta Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: "🔨 Install dependencies"
        run: bun install --frozen-lockfile

      - name: "📦 Build SDK packages"
        run: bun run build:sdk

      - name: "🏷️ Generate beta version with content hash"
        id: version
        run: |
          # Generate hash from SDK and RPC file contents (4 bytes = 8 hex chars)
          HASH=$(find sdk packages/rpc -type f \( -name "*.ts" -o -name "*.tsx" -o -name "package.json" \) -exec cat {} \; | sha256sum | cut -c1-8)
          echo "hash=${HASH}" >> $GITHUB_OUTPUT
          echo "Beta version suffix: -beta.${HASH}"

      - name: "🔄 Update package versions to beta"
        run: |
          HASH="${{ steps.version.outputs.hash }}"

          node -e "
            const fs = require('fs');

            const pkgPaths = [
              'packages/rpc/package.json',
              'sdk/core/package.json',
              'sdk/legacy/package.json',
              'sdk/react/package.json',
              'sdk/components/package.json',
            ];

            // Pass 1: Bump versions and collect name → betaVersion map
            const betaVersions = {};
            for (const pkgPath of pkgPaths) {
              if (!fs.existsSync(pkgPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              const betaVersion = pkg.version + '-beta.${HASH}';
              betaVersions[pkg.name] = betaVersion;
              pkg.version = betaVersion;
              fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
              console.log('Version: ' + pkg.name + ' -> ' + betaVersion);
            }

            // Pass 2: Rewrite workspace:* deps to exact beta versions
            // Without this, bun publish resolves workspace:* to the stable version,
            // causing consumers to pull mismatched stable deps instead of beta ones
            for (const pkgPath of pkgPaths) {
              if (!fs.existsSync(pkgPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              let changed = false;
              for (const depType of ['dependencies', 'peerDependencies']) {
                if (!pkg[depType]) continue;
                for (const [name, version] of Object.entries(pkg[depType])) {
                  if (String(version).startsWith('workspace:') && betaVersions[name]) {
                    pkg[depType][name] = betaVersions[name];
                    changed = true;
                  }
                }
              }
              if (changed) {
                fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
                console.log('Deps rewritten: ' + pkgPath);
              }
            }
          "

      - name: "🚀 Publish beta packages to npm"
        run: |
          # Configure npm token
          echo "//registry.npmjs.org/:_authToken=${NPM_CONFIG_TOKEN}" > ~/.npmrc

          # Publish RPC package
          RPC_PKG_PATH="packages/rpc"
          if [ -d "$RPC_PKG_PATH" ]; then
            cd "$RPC_PKG_PATH"
            bun publish --tag beta --access public
            echo "✅ Published rpc as beta"
            cd ../..
          fi

          # Publish SDK packages
          SDK_DIRS=(core legacy react components)

          for dir in "${SDK_DIRS[@]}"; do
            PKG_PATH="sdk/${dir}"
            if [ -d "$PKG_PATH" ]; then
              cd "$PKG_PATH"

              # Publish with beta tag
              bun publish --tag beta --access public

              echo "✅ Published ${dir} as beta"
              cd ../..
            fi
          done
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
