name: "Publish plugin release"
description: "Build PHP plugin, create tag, and publish GitHub release for a single PHP plugin"

inputs:
  plugin-name:
    description: "Display name, e.g. 'WordPress Plugin'"
    required: true
  plugin-slug:
    description: "Slug used in tag/release name, e.g. 'wordpress'"
    required: true
  directory:
    description: "Plugin directory, e.g. 'plugins/wordpress'"
    required: true
  version-file:
    description: "File (relative to directory) containing the version; .php or .json"
    required: true
  artifact-glob:
    description: "Glob (relative to directory) for built release assets, e.g. 'dist/frak-integration-*.zip'"
    required: true

runs:
  using: composite
  steps:
    - name: "🔢 Read version from file"
      id: version
      shell: bash
      working-directory: ${{ inputs.directory }}
      env:
        VERSION_FILE: ${{ inputs.version-file }}
      run: |
        case "$VERSION_FILE" in
          *.php)
            VERSION=$(grep -E '^\s*\*\s*Version:' "$VERSION_FILE" | head -n1 | awk '{print $3}')
            ;;
          *.json)
            VERSION=$(jq -r '.version' "$VERSION_FILE")
            ;;
          *)
            echo "::error::Unsupported version file type: $VERSION_FILE"
            exit 1
            ;;
        esac
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "::error::Invalid version read from $VERSION_FILE: '$VERSION' (expected: X.Y.Z)"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: "📝 Extract release notes"
      id: notes
      uses: release-flow/keep-a-changelog-action@v3
      with:
        command: query
        version: ${{ steps.version.outputs.version }}
        changelog: ${{ inputs.directory }}/CHANGELOG.md

    - name: "🐘 Setup PHP"
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.4"
        tools: "composer:v2"
        coverage: none

    - name: "📦 Build plugin zip"
      shell: bash
      working-directory: ${{ inputs.directory }}
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        chmod +x build.sh
        ./build.sh "$VERSION"

    - name: "🏷️ Create tag"
      shell: bash
      env:
        VERSION: ${{ steps.version.outputs.version }}
        PLUGIN_SLUG: ${{ inputs.plugin-slug }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "${PLUGIN_SLUG}-${VERSION}"
        git push origin "${PLUGIN_SLUG}-${VERSION}"

    - name: "🚀 Create GitHub release"
      uses: softprops/action-gh-release@v3
      with:
        tag_name: "${{ inputs.plugin-slug }}-${{ steps.version.outputs.version }}"
        name: "${{ inputs.plugin-name }} ${{ steps.version.outputs.version }}"
        body: ${{ steps.notes.outputs.release-notes }}
        files: ${{ inputs.directory }}/${{ inputs.artifact-glob }}
