name: "Prepare plugin release PR"
description: "Bump version + promote CHANGELOG and open a release PR for a PHP plugin"

inputs:
  version:
    description: "Semantic version to release (e.g. 1.0.1)"
    required: true
  plugin-name:
    description: "Display name, e.g. 'WordPress Plugin'"
    required: true
  plugin-slug:
    description: "Slug used in branch/tag/label, e.g. 'wordpress'"
    required: true
  directory:
    description: "Plugin directory, e.g. 'plugins/wordpress'"
    required: true
  version-file:
    description: "File (relative to directory) containing the version; .php or .json"
    required: true
  base-branch:
    description: "Branch to open the release PR against"
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: "✅ Validate version format"
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "::error::Invalid version format: $VERSION (expected: X.Y.Z)"
          exit 1
        fi

    - name: "🔢 Bump version file"
      shell: bash
      working-directory: ${{ inputs.directory }}
      env:
        VERSION: ${{ inputs.version }}
        VERSION_FILE: ${{ inputs.version-file }}
      run: |
        case "$VERSION_FILE" in
          *.php)
            sed -i -E "s|^(\s*\*\s*Version:\s*).*$|\1${VERSION}|" "$VERSION_FILE"
            grep -E '^\s*\*\s*Version:' "$VERSION_FILE"
            ;;
          *.json)
            tmp=$(mktemp)
            jq --arg v "$VERSION" '.version = $v' "$VERSION_FILE" > "$tmp" && mv "$tmp" "$VERSION_FILE"
            grep -E '"version"' "$VERSION_FILE"
            ;;
          *)
            echo "::error::Unsupported version file type: $VERSION_FILE"
            exit 1
            ;;
        esac

    - name: "📝 Promote CHANGELOG [Unreleased] → [${{ inputs.version }}]"
      # Pinned to commit on main (PR #86) which adds support for explicit semver versions.
      # v3.0.0 (the latest tag) only accepts bump keywords (patch/minor/major) and rejects values like "1.0.1".
      # Revert to @v3 once a newer tag is released that contains this change.
      uses: release-flow/keep-a-changelog-action@51fdfb38631a4d2530cf1f3b11c0bba0c0f5f1e2
      with:
        command: bump
        version: ${{ inputs.version }}
        changelog: ${{ inputs.directory }}/CHANGELOG.md
        tag-prefix: ${{ inputs.plugin-slug }}-
        keep-unreleased-section: true
        fail-on-empty-release-notes: true

    - name: "📌 Create release PR"
      uses: peter-evans/create-pull-request@v8
      with:
        branch: release/${{ inputs.plugin-slug }}-${{ inputs.version }}
        base: ${{ inputs.base-branch }}
        title: "chore(${{ inputs.plugin-slug }}): release ${{ inputs.version }}"
        commit-message: "chore(${{ inputs.plugin-slug }}): release ${{ inputs.version }}"
        body: |
          Release **${{ inputs.plugin-name }} ${{ inputs.version }}**.

          Merging this PR will:
          - Tag the merge commit as `${{ inputs.plugin-slug }}-${{ inputs.version }}`
          - Build the plugin zip
          - Create a GitHub release with the CHANGELOG notes + zip asset
        labels: release:${{ inputs.plugin-slug }}
        delete-branch: true
        add-paths: |
          ${{ inputs.directory }}/${{ inputs.version-file }}
          ${{ inputs.directory }}/CHANGELOG.md
