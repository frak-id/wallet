server {
    listen       80;
    server_name  localhost;

    # Enable sendfile for efficient file serving
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Cache open file descriptors (improves performance significantly)
    # inactive=20s means unused files are removed after 20s
    # This is safe during deployments because each pod has its own cache
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Serve pre-compressed .gz files if available (from build process)
    gzip_static on;
    
    # Enable real-time gzip compression as fallback
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-font-ttf font/opentype image/svg+xml image/x-icon;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Service worker with no cache (must always be fresh)
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Service-Worker-Allowed "/";
    }

    # Static assets with aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Server-side proxy to the Monerium API. Bypasses Monerium's broken CORS
    # preflight (their OPTIONS handler routes by the actual Accept header
    # value, which browsers do not replay) by going server-to-server.
    # ${MONERIUM_API_HOST} is substituted at container startup by nginx's
    # template entrypoint (see Dockerfile NGINX_ENVSUBST_FILTER).
    location /monerium-api/ {
        # CORS allowlist for Tauri WebView origins (iOS: tauri://localhost,
        # Android: https://tauri.localhost). Reflect the matched origin so
        # the browser passes credentialed-style requests. Web clients hit
        # this same-origin and don't trigger CORS at all.
        set $cors_origin "";
        if ($http_origin ~* "^(tauri://localhost|https?://tauri\.localhost)$") {
            set $cors_origin $http_origin;
        }

        # Preflight short-circuit before forwarding to Monerium.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;

        proxy_pass https://${MONERIUM_API_HOST}/;
        proxy_set_header Host ${MONERIUM_API_HOST};
        proxy_set_header Accept "application/vnd.monerium.api-v2+json";
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    # Main app - SPA routing
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/index.html /index.html;

        # Cache control for HTML (no cache, no etag to prevent stale content)
        location ~ \.html$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header X-Content-Type-Options "nosniff";
            etag off;
        }
    }
}
