<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta
            id="viewport"
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        >
        <script>
        // Disable pinch-to-zoom only in Tauri (native app) for better native feel
        if (window.__TAURI_INTERNALS__) {
            document
                .getElementById("viewport")
                ?.setAttribute(
                    "content",
                    "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
                );
        }
        </script>

        <!-- Primary Meta Tags -->
        <title>Frak Wallet | Your Web3 Identity & Reward Hub</title>
        <meta name="application-name" content="Frak Wallet">
        <meta
            name="description"
            content="Frak Wallet: Your passkey-first smart wallet for a unified web identity. Earn rewards through website interactions, seamlessly integrate with partner sites, and manage your digital assets securely."
        >
        <meta name="theme-color" content="#001432">
        <meta
            name="keywords"
            content="frak, frak-wallet, blockchain wallet, smart wallet, web3 identity, passkey, digital rewards ,user engagement"
        >

        <!-- Authors -->
        <meta name="author" content="Frak labs">
        <meta name="author" content="Rodolphe Stoclin">
        <meta name="author" content="Quentin Nivelais">
        <meta name="creator" content="Frak labs">
        <meta name="publisher" content="Frak labs">

        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://wallet.frak.id">
        <meta
            property="og:title"
            content="Frak Wallet | Your Web3 Identity & Reward Hub"
        >
        <meta
            property="og:description"
            content="Manage your unified web identity, earn rewards, and interact seamlessly with partner websites using our passkey-first blockchain smart wallet."
        >
        <meta property="og:site_name" content="Frak Wallet">

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:site" content="@frak_defi">
        <meta
            name="twitter:title"
            content="Frak Wallet | Your Web3 Identity & Reward Hub"
        >
        <meta
            name="twitter:description"
            content="Manage your unified web identity, earn rewards, and interact seamlessly with partner websites using our passkey-first blockchain smart wallet."
        >

        <!-- PWA -->
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-title" content="Frak Wallet">
        <meta name="apple-mobile-web-app-status-bar-style" content="default">
        <meta name="google" content="notranslate">

        <!-- Icons -->
        <link rel="icon" href="/favicon.ico" sizes="32x32">
        <link rel="icon" href="/icon.svg" type="image/svg+xml">
        <link rel="apple-touch-icon" href="/icon-192.png" type="image/png">
        <link
            rel="manifest"
            href="/manifest.json"
            crossorigin="use-credentials"
        >

        <!-- Authors -->
        <link rel="author" href="https://frak.id/">
        <link rel="author" href="https://github.com/srod">
        <link rel="author" href="https://github.com/KONFeature">

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
        >

        <!-- PWA Install Prompt Handler -->
        <script>
        window.addEventListener("beforeinstallprompt", (e) => {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            window.promptEvent = e;
        });
        </script>
    </head>

    <body class="scrollbars">
        <style>
        /* Splash overlay styles — must be in <style> block, not inline attributes,
           because Tauri v2 CSP blocks inline style attributes (nonce-based policy) */
        #splash-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            background: #001432;
            transition: opacity 0.3s ease-out;
        }
        #splash-overlay .splash-logo {
            animation: splash-fade-in 0.4s ease-out;
        }
        #splash-overlay .splash-bar {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background: rgba(2, 186, 240, 0.2);
            overflow: hidden;
            animation: splash-fade-in 0.6s ease-out 0.2s both;
        }
        #splash-overlay .splash-bar-inner {
            width: 100%;
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #b123b3, #02baf0, #02e6d5);
            animation: splash-loading 1.2s ease-in-out infinite;
            transform-origin: left;
        }
        @keyframes splash-fade-in {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes splash-loading {
            0% {
                transform: scaleX(0);
                transform-origin: left;
            }
            50% {
                transform: scaleX(1);
                transform-origin: left;
            }
            50.1% {
                transform: scaleX(1);
                transform-origin: right;
            }
            100% {
                transform: scaleX(0);
                transform-origin: right;
            }
        }
        </style>

        <!-- Splash overlay: shown while React loads, removed by main.tsx -->
        <div id="splash-overlay">
            <svg
                class="splash-logo"
                width="120"
                height="120"
                viewBox="0 0 38 38"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
            >
                <path
                    fill="url(#splash-grad)"
                    d="M12.973 29.544.485 25.302a.367.367 0 0 0-.485.35v7.738c0 .158.1.298.25.349l12.487 4.241a.367.367 0 0 0 .485-.349v-7.738a.37.37 0 0 0-.25-.35m12.989-14.84-12.49 4.241a.368.368 0 0 0-.25.35v7.738c0 .252.247.43.485.349l12.49-4.242c.15-.05.25-.19.25-.349v-7.738a.367.367 0 0 0-.485-.35M37.692.012l-20.911 6.76a.368.368 0 0 0-.255.35v7.928c0 .158.156.27.308.22l20.911-6.759a.369.369 0 0 0 .255-.35V.23a.235.235 0 0 0-.308-.22"
                />
                <defs>
                    <linearGradient
                        id="splash-grad"
                        x1="1.77"
                        x2="38.73"
                        y1="31.574"
                        y2="5.819"
                        gradientUnits="userSpaceOnUse"
                    >
                        <stop offset=".021" stop-color="#B15EB3" />
                        <stop offset=".292" stop-color="#B123B3" />
                        <stop offset=".424" stop-color="#6E5CCA" />
                        <stop offset=".554" stop-color="#348FDF" />
                        <stop offset=".699" stop-color="#02BAF0" />
                        <stop offset=".897" stop-color="#02E6D5" />
                    </linearGradient>
                </defs>
            </svg>
            <div class="splash-bar">
                <div class="splash-bar-inner"></div>
            </div>
        </div>
        <script>
        // Only show splash overlay in Tauri native app
        if (window.__TAURI_INTERNALS__) {
            document.getElementById("splash-overlay").style.display = "flex";
            window.__SPLASH_SHOWN_AT__ = Date.now();
        }
        </script>

        <div id="root"></div>
        <script type="module" src="/app/main.tsx"></script>
    </body>
</html>
