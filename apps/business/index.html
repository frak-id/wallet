    <body>
        <div id="root">
            <!-- Initial loading spinner - replaced when React mounts -->
            <style>
            html,
            body,
            #root {
                margin: 0;
                padding: 0;
                min-height: 100vh;
            }
            .initial-loader {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 24px;
                min-height: 100vh;
                background-color: #ffffff;
                color: #0043ef;
                font-family: Inter, system-ui, sans-serif;
                opacity: 0;
                animation: loader-fade-in 200ms ease-out 200ms forwards;
            }
            @keyframes loader-fade-in {
                to {
                    opacity: 1;
                }
            }
            .initial-loader__text {
                color: #737373;
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .spinner {
                width: 20px;
                height: 20px;
                position: relative;
                opacity: 0.85;
            }
            .spinner span {
                position: absolute;
                top: 0;
                left: calc(50% - 6.25% / 2);
                width: 12.5%;
                height: 100%;
                animation: spinner-fade 800ms linear infinite;
            }
            .spinner span::before {
                content: "";
                display: block;
                width: 100%;
                height: 30%;
                border-radius: 3px;
                background-color: #0043ef;
            }
            .spinner span:nth-child(1) {
                transform: rotate(0deg);
                animation-delay: -800ms;
            }
            .spinner span:nth-child(2) {
                transform: rotate(45deg);
                animation-delay: -700ms;
            }
            .spinner span:nth-child(3) {
                transform: rotate(90deg);
                animation-delay: -600ms;
            }
            .spinner span:nth-child(4) {
                transform: rotate(135deg);
                animation-delay: -500ms;
            }
            .spinner span:nth-child(5) {
                transform: rotate(180deg);
                animation-delay: -400ms;
            }
            .spinner span:nth-child(6) {
                transform: rotate(225deg);
                animation-delay: -300ms;
            }
            .spinner span:nth-child(7) {
                transform: rotate(270deg);
                animation-delay: -200ms;
            }
            .spinner span:nth-child(8) {
                transform: rotate(315deg);
                animation-delay: -100ms;
            }
            @keyframes spinner-fade {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0.25;
                }
            }
            </style>
            <div class="initial-loader">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="64"
                    height="64"
                    fill="none"
                    viewBox="0 0 120 120"
                    aria-hidden="true"
                >
                    <title>Frak</title>
                    <path
                        fill="currentColor"
                        d="M40.9656 92.9592L1.53047 79.6135C0.77971 79.3587 0 79.9184 0 80.7116V105.06C0 105.558 0.316516 105.998 0.78743 106.158L40.2226 119.504C40.9734 119.759 41.7531 119.199 41.7531 118.406V94.0574C41.7531 93.5594 41.4366 93.1194 40.9656 92.9592ZM81.9853 46.2654L42.5405 59.6112C42.0696 59.7714 41.7531 60.2114 41.7531 60.7094V85.0579C41.7531 85.8511 42.5328 86.4108 43.2835 86.1561L82.7283 72.8103C83.1993 72.6501 83.5158 72.2101 83.5158 71.7121V47.3636C83.5158 46.5704 82.738 46.0107 81.9853 46.2654ZM119.027 0.0367608L52.9913 21.3051C52.5127 21.4595 52.1884 21.9053 52.1884 22.409V47.3559C52.1884 47.8519 52.6806 48.2031 53.1592 48.0487L119.195 26.7804C119.674 26.626 120 26.1802 120 25.6765V0.729621C119.998 0.233617 119.506 -0.117637 119.027 0.0367608Z"
                    />
                </svg>

                        <span></span><span></span><span></span><span></span>
                    </div>
                    Loading dashboard...
                </div>
            </div>
