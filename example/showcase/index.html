<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frak SDK Showcase</title>
    <meta name="description" content="Frak SDK Showcase - Interactive component demos" />
    <link rel="icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
        const detectWalletUrl = <%- detectWalletUrl %>;

        (async () => {
            const walletUrl = await detectWalletUrl(<%= useLocal %>, "<%= walletUrl %>");
            const config = localStorage.getItem("frak-wallet-sdk-config");

            if (config) {
                window.FrakSetup = {
                    config: {
                        walletUrl,
                        ...JSON.parse(config),
                    },
                };
            } else {
                window.FrakSetup = {
                    config: {
                        walletUrl,
                        metadata: {
                            name: "Example components",
                        },
                    },
                };
            }

            // Load SDK first, then React app after SDK is ready
            const sdkScript = document.createElement('script');
            sdkScript.type = 'module';
            sdkScript.src = '<%- sdkScriptSrc %>';
            sdkScript.onload = () => {
                const appScript = document.createElement('script');
                appScript.type = 'module';
                appScript.src = '/src/main.tsx';
                document.body.appendChild(appScript);
            };
            document.head.appendChild(sdkScript);
        })();
    </script>
</head>

<body>
    <div id="root"></div>
</body>

</html>
